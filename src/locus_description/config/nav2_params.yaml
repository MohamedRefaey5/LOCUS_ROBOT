# ============================================================
# Nav2 Parameters for LOCUS Robot
# Differential Drive, 2WD + Caster
# ROS2 Jazzy / Gazebo Harmonic
# Based on official Nav2 documentation:
# https://docs.nav2.org/configuration/index.html
# ============================================================

# ============================================================
# BEHAVIOR TREE NAVIGATOR
# Orchestrates the overall navigation behavior
# ============================================================
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_only_if_path_becomes_invalid.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    navigators:
      - "navigate_to_pose"
      - "navigate_through_poses"
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
# ============================================================
# PLANNER SERVER — Global Path Planning
# Uses NavFn (Dijkstra) to find shortest path on the map
# ============================================================
planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5         # goal tolerance in meters
      use_astar: false       # false = Dijkstra, true = A*
      allow_unknown: true    # allow planning through unknown space

# ============================================================
# CONTROLLER SERVER — Local Path Following
# DWB tracks the global path and avoids dynamic obstacles
# ============================================================
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0   # Hz — how often to compute velocity

    # In Jazzy, cmd_vel is TwistStamped by default
    # Our cmd_vel_relay handles the conversion
    enable_stamped_cmd_vel: true

    # Minimum speeds — robot must move at least this fast
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0    # 0 for differential drive
    min_theta_velocity_threshold: 0.001

    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]

    # Progress checker — ensures robot is making progress
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5   # meters
      movement_time_allowance: 10.0   # seconds

    # Goal checker — when is goal considered reached?
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25         # meters
      yaw_goal_tolerance: 0.25        # radians (~14 degrees)
      stateful: true

    # DWB Controller — Dynamic Window Approach
    # Best choice for differential drive robots
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      # Velocity limits — must match your robot's physical limits
      min_vel_x: 0.0
      max_vel_x: 0.26        # m/s forward
      min_vel_y: 0.0
      max_vel_y: 0.0         # 0 for differential drive (no strafe)
      min_vel_theta: -1.0    # rad/s rotation
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.26

      # Acceleration limits
      acc_lim_x: 2.5
      acc_lim_y: 0.0         # 0 for differential drive
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2

      # DWB sampling — how many trajectories to evaluate
      vx_samples: 20         # number of linear velocity samples
      vy_samples: 1          # 1 for differential drive
      vtheta_samples: 20     # number of angular velocity samples

      # Simulation time for trajectory rollout
      sim_time: 1.7          # seconds to simulate ahead

      # Path tracking
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true

      # DWB Critics — score each trajectory candidate
      critics:
        - "RotateToGoal"      # rotate to face goal when close
        - "Oscillation"       # penalize back-and-forth motion
        - "BaseObstacle"      # avoid obstacles
        - "GoalAlign"         # align heading with path
        - "PathAlign"         # follow the global path
        - "PathDist"          # stay close to global path
        - "GoalDist"          # get closer to goal

      # Critic weights
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# ============================================================
# COSTMAP — Global (for path planning)
# The full map with inflation around obstacles
# ============================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 1.0    # Hz
      publish_frequency: 1.0
      resolution: 0.05         # meters per cell (match map resolution)
      track_unknown_space: true

      # Robot footprint — use radius for circular robot
      # Your robot is 30cm wide, 50cm long → radius of circumscribed circle
      robot_radius: 0.30

      # Plugins for global costmap
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Static layer — loads the saved map
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      # Obstacle layer — adds dynamic obstacles from LiDAR
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      # Inflation layer — adds safety buffer around obstacles
      # inflation_radius: how far to inflate obstacles
      # cost_scaling_factor: how fast cost decays with distance
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55   # larger than robot_radius for safety

      always_send_full_costmap: true

# ============================================================
# COSTMAP — Local (for obstacle avoidance)
# Small rolling window around the robot
# ============================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0    # Hz — faster than global
      publish_frequency: 2.0
      resolution: 0.05

      # Rolling window size — area around robot to consider
      rolling_window: true
      width: 3      # meters
      height: 3     # meters

      robot_radius: 0.30

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: true

# ============================================================
# MAP SERVER
# ============================================================
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # set from launch file

# ============================================================
# AMCL — already configured in amcl.yaml
# Repeated here so Nav2 bringup can find it
# ============================================================
amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan
    robot_model_type: nav2_amcl::DifferentialMotionModel
    min_particles: 500
    max_particles: 2000
    update_min_d: 0.2
    update_min_a: 0.5
    resample_interval: 1
    laser_model_type: likelihood_field
    laser_max_range: 12.0
    laser_min_range: 0.15
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    transform_tolerance: 1.0
    tf_broadcast: true

# ============================================================
# BEHAVIOR SERVER — Recovery behaviors
# ============================================================
behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      - "spin"
      - "back_up"
      - "wait"
    spin:
      plugin: "nav2_behaviors::Spin"
    back_up:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# ============================================================
# VELOCITY SMOOTHER
# Smooths velocity commands to reduce jerky motion
# ============================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ============================================================
# LIFECYCLE MANAGER
# ============================================================
lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - velocity_smoother
